<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I know what I want – Memorering</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap');
  :root {
    --ink:#2a1f14;--ink-mid:#5c4a33;--ink-light:#9c8568;
    --accent:#7a4a22;--accent-l:#c98b4a;
    --paper:#f5f0e8;--paper-dark:#ebe3d0;--paper-mid:#ddd3bc;
    --green:#4a7a4a;--red:#8b2a2a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);font-family:'Lato',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 3rem;}
  h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--ink);margin-bottom:.2rem;}
  .subtitle{font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-l);margin-bottom:1.6rem;}
  .section-label{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-light);margin-bottom:.5rem;align-self:flex-start;width:100%;max-width:580px;}
  .verse-bar{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.4rem;width:100%;max-width:580px;}
  .verse-btn{padding:.4rem .9rem;border:1.5px solid var(--paper-mid);background:transparent;border-radius:4px;font-family:'Lato',sans-serif;font-size:.78rem;color:var(--ink-light);cursor:pointer;transition:all .2s;}
  .verse-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .verse-btn:hover:not(.active){border-color:var(--accent-l);color:var(--accent);}
  .mode-bar{display:flex;gap:.5rem;margin-bottom:2rem;background:var(--paper-dark);border-radius:6px;padding:4px;width:100%;max-width:580px;}
  .mode-btn{flex:1;padding:.45rem .6rem;border:none;background:transparent;border-radius:4px;font-family:'Lato',sans-serif;font-size:.78rem;color:var(--ink-light);cursor:pointer;transition:all .2s;}
  .mode-btn.active{background:var(--accent);color:#fff;}
  .card-area{width:100%;max-width:580px;}
  .progress-bar{height:3px;background:var(--paper-mid);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent-l);border-radius:2px;transition:width .4s ease;}
  .card{background:#fff;border-radius:8px;padding:2rem 2rem 1.5rem;box-shadow:0 2px 12px rgba(42,31,20,.10);min-height:180px;display:flex;flex-direction:column;justify-content:center;margin-bottom:1.2rem;}
  .card-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-l);margin-bottom:1rem;}
  .card-line{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--ink);line-height:1.65;margin-bottom:.25rem;}
  .card-line.hidden{color:transparent;background:var(--paper-mid);border-radius:3px;user-select:none;cursor:pointer;transition:color .3s,background .3s;}
  .card-line.revealed{color:var(--ink);background:transparent;}
  .fill-input{font-family:'Playfair Display',serif;font-size:1rem;border:none;border-bottom:2px solid var(--paper-mid);background:transparent;color:var(--ink);padding:4px 2px;width:100%;outline:none;margin-bottom:.3rem;transition:border-color .2s;}
  .fill-input:focus{border-color:var(--accent-l);}
  .fill-input.correct{border-color:var(--green);color:var(--green);}
  .fill-input.wrong{border-color:var(--red);}
  .hint-text{font-size:.78rem;color:var(--ink-light);font-style:italic;margin-top:4px;min-height:1.2em;}
  .btn-row{display:flex;gap:.7rem;flex-wrap:wrap;}
  .btn{flex:1;min-width:90px;padding:.65rem 1rem;border:none;border-radius:5px;font-family:'Lato',sans-serif;font-size:.82rem;cursor:pointer;transition:transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-secondary{background:var(--paper-dark);color:var(--ink-mid);}
  .btn-ghost{background:transparent;color:var(--accent-l);border:1px solid var(--paper-mid);}
  .status{text-align:center;margin-top:1.4rem;font-size:.82rem;color:var(--ink-light);}
  .done-screen{text-align:center;padding:2rem;}
  .done-screen .big{font-family:'Playfair Display',serif;font-size:2.5rem;margin-bottom:.5rem;}
  .done-screen p{color:var(--ink-mid);margin-bottom:1rem;}
  .score{font-size:1.3rem;color:var(--accent);margin-bottom:1.5rem;}
  .divider{height:1px;background:var(--paper-mid);width:100%;max-width:580px;margin:.6rem 0 1.4rem;}
</style>
</head>
<body>
<h1>I know what I want</h1>
<p class="subtitle">Memorering</p>
<p class="section-label">Välj avsnitt</p>
<div class="verse-bar" id="verseBar"></div>
<div class="divider"></div>
<p class="section-label">Läge</p>
<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('reveal')">Avslöja rad</button>
  <button class="mode-btn" onclick="setMode('fillin')">Fyll i texten</button>
  <button class="mode-btn" onclick="setMode('blind')">Helt blind</button>
</div>
<div class="card-area" id="app"></div>
<script>
const SECTIONS = [{"label": "Vers 1", "lines": ["Let me tell you my feeling of being free", "Let me show you the roads where I used to be", "Let me show you the birch in which I carved", "With bows and arrows through its heart"]}, {"label": "Refr\u00e4ng", "lines": ["I know what I want, I know what I want and it's free."]}, {"label": "Vers 2", "lines": ["I remember the first time I got ill", "In the way you just want to be popping pills", "Nor did I seek, nor did I find", "Any sympathy for the predicament in my mind"]}, {"label": "Vers 3", "lines": ["These days, time keeps rushing by.", "Every day is a struggle to feel alive.", "I turn to the good old days of old,", "Where every day is a story to be told."]}, {"label": "Vers 4", "lines": ["Just around the bend, there it is", "The feeling of totally screaming bliss.", "But how can it be so hard", "When you know every face on every card?"]}, {"label": "Brygga / Ref", "lines": ["Let me take you back to the place where I didn't know about the blues"]}, {"label": "Hela l\u00e5ten", "lines": ["Let me tell you my feeling of being free", "Let me show you the roads where I used to be", "Let me show you the birch in which I carved", "With bows and arrows through its heart", "I know what I want, I know what I want and it's free.", "I remember the first time I got ill", "In the way you just want to be popping pills", "Nor did I seek, nor did I find", "Any sympathy for the predicament in my mind", "These days, time keeps rushing by.", "Every day is a struggle to feel alive.", "I turn to the good old days of old,", "Where every day is a story to be told.", "Just around the bend, there it is", "The feeling of totally screaming bliss.", "But how can it be so hard", "When you know every face on every card?", "Let me take you back to the place where I didn't know about the blues"]}];
let mode='reveal',currentSection=0,current=0,score=0,total=0;
const verseBar=document.getElementById('verseBar');
SECTIONS.forEach((s,i)=>{const btn=document.createElement('button');btn.className='verse-btn'+(i===0?' active':'');btn.textContent=s.label;btn.onclick=()=>selectSection(i);verseBar.appendChild(btn);});
function selectSection(i){currentSection=i;document.querySelectorAll('.verse-btn').forEach((b,j)=>b.classList.toggle('active',j===i));restart();}
function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['reveal','fillin','blind'][i]===m));restart();}
function restart(){current=0;score=0;total=0;render();}
function getLines(){return SECTIONS[currentSection].lines;}
function getLabel(){return SECTIONS[currentSection].label;}
function render(){const app=document.getElementById('app');const lines=getLines();if(current>=lines.length){renderDone(app);return;}const pct=(current/lines.length)*100;if(mode==='reveal')renderReveal(app,pct,lines);else if(mode==='fillin')renderFillin(app,pct,lines);else renderBlind(app,pct,lines);}
function renderReveal(app,pct,lines){app.innerHTML=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="card"><div class="card-label">${getLabel()} · Rad ${current+1} av ${lines.length}</div>${lines.map((l,i)=>i<current?`<div class="card-line">${l}</div>`:i===current?`<div class="card-line hidden" id="currentLine" onclick="revealLine()">${l}</div>`:`<div class="card-line" style="color:var(--paper-mid)">${l}</div>`).join('')}</div><p style="font-size:.78rem;color:var(--ink-light);text-align:center;margin-bottom:.8rem">Tryck på raden — försök minnas den innan du avslöjar!</p><div class="btn-row"><button class="btn btn-secondary" onclick="restart()">Börja om</button><button class="btn btn-primary" id="nextBtn" onclick="next()" style="display:none">Nästa rad →</button></div><div class="status">Rad ${current+1} av ${lines.length}</div>`;}
function revealLine(){document.getElementById('currentLine').classList.remove('hidden');document.getElementById('currentLine').classList.add('revealed');document.getElementById('nextBtn').style.display='block';}
function renderFillin(app,pct,lines){app.innerHTML=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="card"><div class="card-label">${getLabel()} · Rad ${current+1} av ${lines.length} — fyll i texten</div>${lines.slice(0,current).map(l=>`<div class="card-line">${l}</div>`).join('')}<input class="fill-input" id="fillInput" placeholder="Skriv raden här…" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkFill()"><div class="hint-text" id="hintText"></div>${lines.slice(current+1).map(l=>`<div class="card-line" style="color:var(--paper-mid)">${l}</div>`).join('')}</div><div class="btn-row"><button class="btn btn-ghost" onclick="showHint()">Ledtråd</button><button class="btn btn-secondary" onclick="restart()">Börja om</button><button class="btn btn-primary" onclick="checkFill()">Kolla →</button></div><div class="status">Rätt: ${score} / ${total}</div>`;document.getElementById('fillInput').focus();}
function checkFill(){const input=document.getElementById('fillInput');const hint=document.getElementById('hintText');const lines=getLines();const val=input.value.trim().toLowerCase().replace(/[^a-zåäö0-9\s]/g,'');const correct=lines[current].toLowerCase().replace(/[^a-zåäö0-9\s]/g,'');total++;const vWords=val.split(' ').filter(Boolean);const cWords=correct.split(' ').filter(Boolean);const matches=vWords.filter(w=>cWords.includes(w)).length;const ok=matches>=Math.ceil(cWords.length*0.65);if(ok){score++;input.classList.add('correct');hint.textContent='✓ Rätt!';hint.style.color='var(--green)';setTimeout(()=>next(),900);}else{input.classList.add('wrong');hint.innerHTML=`Rätt svar: <em>${lines[current]}</em>`;hint.style.color='var(--red)';setTimeout(()=>next(),2400);}}
function showHint(){const words=getLines()[current].split(' ');document.getElementById('hintText').textContent=words.slice(0,3).join(' ')+'…';document.getElementById('hintText').style.color='var(--accent-l)';}
function renderBlind(app,pct,lines){app.innerHTML=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="card" style="align-items:center;text-align:center"><div class="card-label" style="text-align:center">${getLabel()} · Rad ${current+1} av ${lines.length}</div><div style="font-size:3rem;color:var(--paper-mid);margin:1rem 0">?</div><p style="color:var(--ink-light);font-size:.85rem;font-style:italic">Sjung eller säg raden — tryck sen för att se om du hade rätt</p></div><div class="btn-row"><button class="btn btn-secondary" onclick="restart()">Börja om</button><button class="btn btn-primary" onclick="revealBlind()">Visa raden</button></div>`;}
function revealBlind(){const app=document.getElementById('app');const lines=getLines();const pct=(current/lines.length)*100;app.innerHTML=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="card" style="align-items:center;text-align:center"><div class="card-label">${getLabel()} · Rad ${current+1} av ${lines.length}</div><div class="card-line" style="text-align:center">${lines[current]}</div></div><p style="font-size:.8rem;color:var(--ink-light);text-align:center;margin-bottom:.8rem">Hade du rätt?</p><div class="btn-row"><button class="btn btn-secondary" onclick="restart()">Börja om</button><button class="btn" style="background:var(--red);color:#fff;flex:1" onclick="next()">Nej ✗</button><button class="btn" style="background:var(--green);color:#fff;flex:1" onclick="scoreAndNext()">Ja ✓</button></div><div class="status">Rätt: ${score} / ${total}</div>`;}
function scoreAndNext(){score++;total++;next();}
function next(){current++;render();}
function renderDone(app){const lines=getLines();app.innerHTML=`<div class="card done-screen"><div class="big">🎸</div><p>${getLabel()} — klar!</p>${mode!=='reveal'?`<div class="score">${score} / ${lines.length} rätt${score===lines.length?' 🎉':''}</div>`:''}<div class="btn-row" style="justify-content:center;gap:.7rem"><button class="btn btn-secondary" onclick="restart()">Kör igen</button>${currentSection<SECTIONS.length-2?`<button class="btn btn-primary" onclick="selectSection(${currentSection+1})">Nästa avsnitt →</button>`:''}</div></div>`;}
render();
</script></body></html>
